name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GitHub_TOKEN }}
    steps:
      - name: Setup JS
        uses: zotero-plugin-dev/workflows/setup-js@main
      - name: Cache tsc
        uses: actions/cache@v4
        with:
          path: node_modules/.cache/tsbuildinfo
          key: tsc-${{ runner.os }}-${{ hashFiles('src/**/*.ts', 'tsconfig.json') }}
          restore-keys: tsc-${{ runner.os }}-
      - name: Run Lint
        run: npm run lint:check

  build:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GitHub_TOKEN }}
    steps:
      - name: Setup JS
        uses: zotero-plugin-dev/workflows/setup-js@main
      - name: Cache tsc
        uses: actions/cache@v4
        with:
          path: node_modules/.cache/tsbuildinfo
          key: tsc-${{ runner.os }}-${{ hashFiles('src/**/*.ts', 'tsconfig.json') }}
          restore-keys: tsc-${{ runner.os }}-
      - name: Run Build
        run: npm run build
      - name: Upload build result
        uses: actions/upload-artifact@v4
        with:
          name: build-result
          path: .scaffold/build

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Setup JS
        uses: zotero-plugin-dev/workflows/setup-js@main
      - name: Cache vitest
        uses: actions/cache@v4
        with:
          path: node_modules/.cache/vitest
          key: vitest-${{ runner.os }}-${{ hashFiles('src/**/*.ts', 'test/**/*.ts', 'vitest.config.ts') }}
          restore-keys: vitest-${{ runner.os }}-
      - run: npm run test -- --bail=1 --no-color
